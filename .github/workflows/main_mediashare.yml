name: Build and deploy Node.js app to Azure Web App - mediashare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Prepare Deployment Package
        run: |
          # 1. Create a clean folder for the production files
          mkdir -p release
          
          # 2. Copy the standalone server files to the root of the release folder
          cp -r .next/standalone/. release/
          
          # 3. Copy static and public assets so images/CSS work
          mkdir -p release/.next/static
          cp -r .next/static/. release/.next/static/
          cp -r public release/public

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release
          include-hidden-files: true # ✅ CRITICAL: Includes the .next folder

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: release

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mediashare'
          slot-name: 'Production'
          package: release
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_34AFD70BF9BB4323BAE9AF50ADDB5738 }}
